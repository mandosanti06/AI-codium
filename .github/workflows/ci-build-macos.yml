name: CI - Build - macOS

on:
  workflow_dispatch:
    inputs:
      generate_assets:
        type: boolean
        description: Generate assets
      checkout_pr:
        type: string
        description: Checkout PR
  push:
    branches:
      - master
      - insider
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - "**"
    paths:
      - '.github/workflows/ci-build-macos.yml'
      - '.nvmrc'
      - '**/*.sh'
      - 'build/**'
      - 'patches/**'
      - 'product.json'
      - 'src/aicodium-runtime/**'
      - 'src/aicodium-extension/**'
      - 'upstream/stable.json'

env:
  APP_NAME: VSCodium
  BINARY_NAME: ${{ (github.ref == 'refs/heads/insider' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'insider')) && 'codium-insiders' || 'codium' }}
  GH_REPO_PATH: ${{ github.repository }}
  GITHUB_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.head }}
  ORG_NAME: ${{ github.repository_owner }}
  OS_NAME: osx
  VSCODE_QUALITY: ${{ (github.ref == 'refs/heads/insider' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'insider')) && 'insider' || 'stable' }}

permissions: {}

jobs:
  build:
    name: macOS ${{ matrix.vscode_arch }} baseline
    runs-on: ${{ matrix.runner }}
    env:
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            vscode_arch: x64
          - runner: macos-14
            vscode_arch: arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.GITHUB_BRANCH }}
          persist-credentials: false

      - name: Switch to relevant branch
        env:
          PULL_REQUEST_ID: ${{ github.event.inputs.checkout_pr }}
        run: . get_pr.sh

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
        if: env.VSCODE_ARCH == 'x64'

      - name: Clone Code OSS source
        run: . get_repo.sh

      - name: Build macOS ${{ matrix.vscode_arch }} baseline
        env:
          SHOULD_BUILD: yes
        run: ./build.sh

      - name: Prepare unsigned macOS ${{ matrix.vscode_arch }} baseline artifacts
        run: ./prepare_assets.sh
        if: github.event_name == 'pull_request' || github.event.inputs.generate_assets == 'true'

      - name: Upload macOS ${{ matrix.vscode_arch }} baseline artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-${{ matrix.vscode_arch }}
          path: assets/
          retention-days: 3
        if: github.event_name == 'pull_request' || github.event.inputs.generate_assets == 'true'
